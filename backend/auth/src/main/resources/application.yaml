server:
  port: 8081

spring:
  application:
    name: auth
  datasource:
    url: jdbc:postgresql://localhost:5556/ecommerceauth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

auth:
  secret-key: ${JWT_SECRET:dev-secret-key-12345678901234567890}

ecommerce:
  config:
    kafka:
      server-url: 'http://localhost:29092'
      topics:
        usuarios-criados: 'usuarios-criados'
