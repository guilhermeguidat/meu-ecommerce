server:
  port: 8084

spring:
  cloud:
    compatibility-verifier:
      enabled: false
  main:
    allow-circular-references: true
  application:
    name: pedido
  datasource:
    url: jdbc:postgresql://localhost:5556/ecommercepedido
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
ecommerce:
  config:
    kafka:
      server-url: 'http://localhost:29092'
      topics:
        produtos-vendidos: 'produtos-vendidos'
    clients:
      produto:
        url: 'http://localhost:8083/produto'
      participante:
        url: 'http://localhost:8082/participante'
